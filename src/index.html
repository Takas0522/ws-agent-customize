<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ユーザー管理アプリ</title>

  <!-- Bootstrap 5 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <!-- custom-controls (lib) -->
  <link rel="stylesheet" href="../lib/dist/custom-controls.min.css">

  <link rel="stylesheet" href="app.css">
</head>
<body class="bg-light">
  <nav class="navbar navbar-dark bg-primary mb-4">
    <div class="container">
      <span class="navbar-brand mb-0 h1">
        <i class="bi bi-people-fill me-2"></i>ユーザー管理アプリ
      </span>
    </div>
  </nav>

  <main class="container pb-5">
    <!-- フィードバック領域 -->
    <div id="feedback" class="position-fixed top-0 end-0 p-3" style="z-index: 1080;"></div>

    <div class="row g-4">
      <!-- 入力フォーム -->
      <section class="col-lg-5">
        <div class="card shadow-sm">
          <div class="card-header d-flex align-items-center">
            <i class="bi bi-person-plus-fill me-2"></i>
            <span id="form-title" class="fw-bold">新規ユーザー登録</span>
          </div>
          <div class="card-body">
            <form id="user-form" novalidate>
              <input type="hidden" id="user-id" />

              <div class="mb-3">
                <custom-input id="ipt-name"
                  label="名前"
                  placeholder="山田 太郎"
                  maxlength="50"
                  required></custom-input>
              </div>

              <div class="mb-3">
                <custom-input id="ipt-email"
                  label="メールアドレス"
                  type="email"
                  placeholder="user@example.com"
                  pattern="[^@\s]+@[^@\s]+\.[^@\s]+"
                  maxlength="120"
                  required></custom-input>
              </div>

              <div class="mb-3">
                <custom-select id="ipt-active"
                  label="アクティブ状態"
                  placeholder="選択してください"
                  options='[{"value":"active","label":"アクティブ"},{"value":"inactive","label":"非アクティブ"}]'
                  value="active"
                  required></custom-select>
              </div>

              <div class="mb-3">
                <custom-radio id="ipt-option"
                  label="連絡オプション (任意・もう一度クリックで解除)"
                  options='[{"value":"postcard","label":"はがき送付"},{"value":"email","label":"メール送信"}]'
                  inline></custom-radio>
              </div>

              <div class="d-flex gap-2">
                <button type="submit" id="btn-submit" class="btn btn-primary">
                  <i class="bi bi-save me-1"></i><span>登録</span>
                </button>
                <button type="button" id="btn-reset" class="btn btn-outline-secondary">
                  <i class="bi bi-x-circle me-1"></i>クリア
                </button>
              </div>
            </form>
          </div>
        </div>
      </section>

      <!-- 一覧 -->
      <section class="col-lg-7">
        <div class="card shadow-sm">
          <div class="card-header d-flex align-items-center justify-content-between">
            <span><i class="bi bi-list-ul me-2"></i>ユーザー一覧</span>
            <span class="badge bg-secondary" id="user-count">0 件</span>
          </div>
          <div class="card-body p-0">
            <div class="table-responsive">
              <table class="table table-striped mb-0 align-middle">
                <thead class="table-light">
                  <tr>
                    <th>名前</th>
                    <th>メールアドレス</th>
                    <th>状態</th>
                    <th>オプション</th>
                    <th class="text-end">操作</th>
                  </tr>
                </thead>
                <tbody id="user-tbody">
                  <!-- JS で挿入 -->
                </tbody>
              </table>
            </div>
            <div id="empty-state" class="text-center text-muted p-4 d-none">
              <i class="bi bi-inbox fs-1 d-block mb-2"></i>
              ユーザーがまだ登録されていません。
            </div>
          </div>
        </div>
      </section>
    </div>
  </main>

  <!-- 削除確認ダイアログ -->
  <div class="modal fade" id="confirm-modal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title"><i class="bi bi-exclamation-triangle text-warning me-2"></i>削除の確認</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          ユーザー <strong id="confirm-name"></strong> を削除します。よろしいですか？
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">キャンセル</button>
          <button type="button" class="btn btn-danger" id="confirm-delete">
            <i class="bi bi-trash me-1"></i>削除
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- jQuery & Bootstrap -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <!-- custom-controls -->
  <script src="../lib/dist/custom-controls.min.js"></script>

  <!-- app -->
  <script src="app.js"></script>
</body>
</html>
